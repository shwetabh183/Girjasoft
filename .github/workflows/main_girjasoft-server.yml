# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions
# More info on Python, GitHub Actions, and Azure App Service: https://aka.ms/python-webapps-actions

name: Build and deploy Python app to Azure Web App - girjasoft-server

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Create deployment package
        run: |
          # Create a clean zip excluding unnecessary files
          zip -r deploy.zip . \
            -x "*.git*" \
            -x "*girjasoftvenv/*" \
            -x "*node_modules/*" \
            -x "*.sqlite3" \
            -x "*media/*" \
            -x "*staticfiles/*" \
            -x "*__pycache__/*" \
            -x "*.pyc" \
            -x "*whoosh_index/*" \
            -x "*.vscode/*" \
            -x "*.idea/*"

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_9223D618C60448AD9339200F3D4B13C3 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_A45DD053B8E346D4AC7DB8E08AFBF051 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_1BEB38BBFCCA4D7DAB1F718408F321C8 }}

      - name: 'Deploy to Azure Web App'
        uses: azure/webapps-deploy@v3
        id: deploy-to-webapp
        with:
          app-name: 'girjasoft-server'
          slot-name: 'Production'
          package: 'deploy.zip'
