{% load static %}

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | Girjasoft</title>
    <link rel="icon" type="image/png" sizes="32x32" href="{% if white_label_company.icon %}{{white_label_company.icon.url}} {% else %}{% static 'favicons/favicon-32x32.png' %}{% endif %}">
    <link rel="icon" type="image/png" sizes="16x16" href="{% if white_label_company.icon %}{{white_label_company.icon.url}} {% else %}{% static 'favicons/favicon-16x16.png' %}{% endif %}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Animated background */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .bg-animation::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 30%, rgba(59, 130, 246, 0.1) 0%, transparent 50%),
                        radial-gradient(circle at 70% 70%, rgba(99, 102, 241, 0.08) 0%, transparent 50%);
            animation: bgRotate 30s linear infinite;
        }

        @keyframes bgRotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* Floating orbs */
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.4;
            animation: float 20s ease-in-out infinite;
        }

        .orb-1 {
            width: 400px;
            height: 400px;
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            top: -10%;
            right: -10%;
            animation-delay: 0s;
        }

        .orb-2 {
            width: 350px;
            height: 350px;
            background: linear-gradient(135deg, #6366f1, #4f46e5);
            bottom: -15%;
            left: -10%;
            animation-delay: -10s;
        }

        .orb-3 {
            width: 200px;
            height: 200px;
            background: linear-gradient(135deg, #0ea5e9, #0284c7);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation-delay: -5s;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(30px, -30px) scale(1.05); }
            50% { transform: translate(-20px, 20px) scale(0.95); }
            75% { transform: translate(20px, 30px) scale(1.02); }
        }

        /* Content container */
        .error-container {
            position: relative;
            z-index: 10;
            text-align: center;
            padding: 60px;
            max-width: 600px;
        }

        /* Icon with animation */
        .error-icon {
            width: 200px;
            height: 200px;
            margin: 0 auto 40px;
            position: relative;
        }

        .icon-circle {
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.2), rgba(99, 102, 241, 0.1));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid rgba(59, 130, 246, 0.3);
            animation: pulse 2s ease-in-out infinite;
            position: relative;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.4); }
            50% { transform: scale(1.02); box-shadow: 0 0 40px 10px rgba(59, 130, 246, 0.1); }
        }

        .search-icon {
            font-size: 80px;
            color: #60a5fa;
        }

        /* Animated orbit */
        .orbit {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            animation: orbit 8s linear infinite;
        }

        .orbit::before {
            content: '';
            position: absolute;
            width: 16px;
            height: 16px;
            background: linear-gradient(135deg, #3b82f6, #6366f1);
            border-radius: 50%;
            top: -8px;
            left: 50%;
            transform: translateX(-50%);
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.6);
        }

        @keyframes orbit {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* Error code */
        .error-code {
            font-size: 140px;
            font-weight: 900;
            background: linear-gradient(135deg, #60a5fa, #3b82f6, #6366f1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1;
            margin-bottom: 20px;
            text-shadow: 0 10px 40px rgba(59, 130, 246, 0.3);
            animation: glow 3s ease-in-out infinite;
        }

        @keyframes glow {
            0%, 100% { filter: drop-shadow(0 0 20px rgba(59, 130, 246, 0.3)); }
            50% { filter: drop-shadow(0 0 40px rgba(99, 102, 241, 0.5)); }
        }

        /* Error title */
        .error-title {
            font-size: 28px;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 16px;
        }

        /* Error message */
        .error-message {
            font-size: 16px;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 40px;
            line-height: 1.7;
        }

        /* Button */
        .error-btn {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: white;
            padding: 16px 40px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            font-size: 16px;
            transition: all 0.3s ease;
            box-shadow: 0 10px 40px rgba(59, 130, 246, 0.3);
            position: relative;
            overflow: hidden;
        }

        .error-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s ease;
        }

        .error-btn:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 50px rgba(59, 130, 246, 0.4);
            color: white;
        }

        .error-btn:hover::before {
            left: 100%;
        }

        .error-btn ion-icon {
            font-size: 20px;
        }

        /* Decorative dots */
        .dots {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 1;
        }

        .dot {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(59, 130, 246, 0.3);
            border-radius: 50%;
            animation: twinkle 3s ease-in-out infinite;
        }

        .dot:nth-child(1) { top: 15%; left: 20%; animation-delay: 0s; }
        .dot:nth-child(2) { top: 25%; right: 15%; animation-delay: 0.5s; }
        .dot:nth-child(3) { bottom: 20%; left: 10%; animation-delay: 1s; }
        .dot:nth-child(4) { bottom: 30%; right: 25%; animation-delay: 1.5s; }
        .dot:nth-child(5) { top: 40%; left: 5%; animation-delay: 2s; }
        .dot:nth-child(6) { top: 60%; right: 10%; animation-delay: 2.5s; }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.5); }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .error-container {
                padding: 40px 20px;
            }

            .error-icon {
                width: 150px;
                height: 150px;
            }

            .search-icon {
                font-size: 60px;
            }

            .error-code {
                font-size: 100px;
            }

            .error-title {
                font-size: 22px;
            }

            .error-btn {
                padding: 14px 30px;
            }
        }
    </style>
</head>

<body>
    <div class="bg-animation"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
    
    <div class="dots">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
    </div>

    <div class="error-container">
        <div class="error-icon">
            <div class="icon-circle">
                <ion-icon name="search-outline" class="search-icon"></ion-icon>
            </div>
            <div class="orbit"></div>
        </div>
        
        <h1 class="error-code">404</h1>
        <h2 class="error-title">Page Not Found</h2>
        <p class="error-message">
            Oops! The page you're looking for seems to have wandered off.<br>
            Don't worry, let's get you back on track.
        </p>
        
        <a href="/" class="error-btn">
            <ion-icon name="arrow-back-outline"></ion-icon>
            Return to Dashboard
        </a>
    </div>

    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
</body>

</html>
