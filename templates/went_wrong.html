{% load static %}

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Something Went Wrong | Girjasoft</title>
    <link rel="icon" type="image/png" sizes="32x32" href="{% if white_label_company.icon %}{{white_label_company.icon.url}} {% else %}{% static 'favicons/favicon-32x32.png' %}{% endif %}">
    <link rel="icon" type="image/png" sizes="16x16" href="{% if white_label_company.icon %}{{white_label_company.icon.url}} {% else %}{% static 'favicons/favicon-16x16.png' %}{% endif %}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Animated background */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .bg-animation::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 30%, rgba(168, 85, 247, 0.08) 0%, transparent 50%),
                        radial-gradient(circle at 70% 70%, rgba(59, 130, 246, 0.08) 0%, transparent 50%);
            animation: bgRotate 30s linear infinite;
        }

        @keyframes bgRotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* Floating orbs */
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.4;
            animation: float 20s ease-in-out infinite;
        }

        .orb-1 {
            width: 400px;
            height: 400px;
            background: linear-gradient(135deg, #a855f7, #9333ea);
            top: -10%;
            right: -10%;
            animation-delay: 0s;
        }

        .orb-2 {
            width: 350px;
            height: 350px;
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            bottom: -15%;
            left: -10%;
            animation-delay: -10s;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(30px, -30px) scale(1.05); }
            50% { transform: translate(-20px, 20px) scale(0.95); }
            75% { transform: translate(20px, 30px) scale(1.02); }
        }

        /* Content container */
        .error-container {
            position: relative;
            z-index: 10;
            text-align: center;
            padding: 60px;
            max-width: 600px;
        }

        /* Warning icon */
        .error-icon {
            width: 180px;
            height: 180px;
            margin: 0 auto 40px;
            position: relative;
        }

        .icon-circle {
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(168, 85, 247, 0.2), rgba(147, 51, 234, 0.1));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid rgba(168, 85, 247, 0.3);
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(168, 85, 247, 0.4); }
            50% { transform: scale(1.02); box-shadow: 0 0 40px 10px rgba(168, 85, 247, 0.1); }
        }

        .warning-icon {
            font-size: 80px;
            color: #c084fc;
        }

        /* Gears animation */
        .gears {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 120px;
            height: 120px;
        }

        .gear {
            position: absolute;
            width: 50px;
            height: 50px;
            border: 6px solid rgba(168, 85, 247, 0.5);
            border-radius: 50%;
        }

        .gear::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 15px;
            height: 15px;
            background: rgba(168, 85, 247, 0.5);
            border-radius: 50%;
        }

        .gear-1 {
            top: 0;
            left: 10px;
            animation: spin 4s linear infinite;
        }

        .gear-2 {
            bottom: 5px;
            right: 5px;
            animation: spin 4s linear infinite reverse;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* Error title */
        .error-title {
            font-size: 36px;
            font-weight: 800;
            background: linear-gradient(135deg, #c084fc, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 16px;
        }

        /* Error subtitle */
        .error-subtitle {
            font-size: 20px;
            font-weight: 600;
            color: #ffffff;
            margin-bottom: 16px;
        }

        /* Error message */
        .error-message {
            font-size: 16px;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 40px;
            line-height: 1.6;
        }

        /* Button group */
        .btn-group {
            display: flex;
            gap: 16px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .error-btn {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: white;
            padding: 16px 36px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            font-size: 16px;
            transition: all 0.3s ease;
            box-shadow: 0 10px 40px rgba(59, 130, 246, 0.3);
        }

        .error-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 50px rgba(59, 130, 246, 0.4);
            color: white;
        }

        .error-btn--secondary {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: none;
        }

        .error-btn--secondary:hover {
            background: rgba(255, 255, 255, 0.15);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        }

        .error-btn ion-icon {
            font-size: 20px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .error-container {
                padding: 40px 20px;
            }

            .error-icon {
                width: 140px;
                height: 140px;
            }

            .warning-icon {
                font-size: 60px;
            }

            .error-title {
                font-size: 28px;
            }

            .error-subtitle {
                font-size: 18px;
            }

            .btn-group {
                flex-direction: column;
            }
        }
    </style>
</head>

<body>
    <div class="bg-animation"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div class="error-container">
        <div class="error-icon">
            <div class="icon-circle">
                <ion-icon name="warning-outline" class="warning-icon"></ion-icon>
            </div>
        </div>
        
        <h1 class="error-title">Oops!</h1>
        <h2 class="error-subtitle">Something Went Wrong</h2>
        <p class="error-message">
            We encountered an unexpected error while processing your request.<br>
            Please try again or contact support if the issue persists.
        </p>
        
        <div class="btn-group">
            <a href="javascript:location.reload()" class="error-btn error-btn--secondary">
                <ion-icon name="refresh-outline"></ion-icon>
                Try Again
            </a>
            <a href="/" class="error-btn">
                <ion-icon name="arrow-back-outline"></ion-icon>
                Return to Dashboard
            </a>
        </div>
    </div>

    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
</body>

</html>
